<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You | Explore Lahore</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f4f4;
    color:#222;
    text-align:center;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:rgba(255,255,255,0.95);
    z-index:1000;
}

nav a{
    margin-left:25px;
    text-decoration:none;
    color:#222;
    font-weight:500;
}

/* HEADER */
.header{
    height:50vh;
    background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url("images/contact pic.jpg") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:48px;
    font-weight:600;
    text-align:center;
    margin-top:80px; /* space for fixed navbar */
}

/* CONTENT */
.content{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.content h2{
    font-size:36px;
    margin-bottom:20px;
}

.content p{
    font-size:18px;
    line-height:1.7;
    color:#555;
}

.back-btn{
    display:inline-block;
    margin-top:25px;
    text-decoration:none;
    background:#222;
    color:white;
    padding:12px 25px;
    border-radius:30px;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    background:green;
}

/* FOOTER */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Explore Lahore</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="places.html">Places</a>
        <a href="food.html">Food</a>
        <a href="contacts.html">Contacts</a>
    </div>
</nav>

<!-- HEADER -->
<div class="header">
    Thank You!
</div>

<!-- CONTENT -->
<div class="content">
    <h2>Your Message Has Been Sent</h2>
    <p>We have received your message successfully. Our team will get back to you as soon as possible. Thank you for reaching out to Explore Lahore!</p>
    <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Explore Lahore | ICT Project</p>
</footer>

</body>
</html>
