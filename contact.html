<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Explore Lahore</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f4f4;
    color:#222;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:rgba(255,255,255,0.95);
    z-index:1000;
}

nav a{
    margin-left:25px;
    text-decoration:none;
    color:#222;
    font-weight:500;
}

/* HEADER */
.header{
    height:50vh;
    background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)), url("images/contact pic.jpg") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:48px;
    font-weight:600;
    text-align:center;
    margin-top:80px; /* space for fixed navbar */
}

/* CONTACT SECTION */
.contact-section{
    max-width:1000px;
    margin:40px auto;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:40px;
    padding:0 40px;
}

/* INFO BOX */
.contact-info{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    flex:1 1 300px;
}

.contact-info h3{
    margin-bottom:15px;
}

.contact-info p{
    margin-bottom:10px;
    color:#555;
}

/* FORM BOX */
.contact-form{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    flex:1 1 400px;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

.contact-form button{
    background:#222;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

.contact-form button:hover{
    background:green;
}

/* FOOTER */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Explore Lahore</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="places.html">Places</a>
        <a href="food.html">Food</a>
        <a href="contacts.html">Contacts</a>
    </div>
</nav>

<!-- HEADER -->
<div class="header">
    Contact Us
</div>

<!-- CONTACT SECTION -->
<section class="contact-section">

    <!-- INFO BOX -->
    <div class="contact-info">
        <h3>Get in Touch</h3>
        <p><strong>Location:</strong> Lahore, Pakistan</p>
        <p><strong>Email:</strong> info@lahoretourism.com</p>
        <p><strong>Phone:</strong> +92 300 1234567</p>
    </div>

    <!-- FORM BOX -->
    <div class="contact-form">
        <form action="thankyou.html">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" rows="6" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Explore Lahore | ICT Project</p>
</footer>

</body>
</html>
